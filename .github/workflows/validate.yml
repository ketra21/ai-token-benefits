name: Validate Data

on:
  pull_request:
    paths:
      - 'data/**'
  push:
    paths:
      - 'data/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate data files
        run: python scripts/validate.py

      - name: Generate leaderboard
        run: python scripts/generate_leaderboard.py
